# We don't want osbuild to inject mount units for the
# disks as we will change the disks uuids anyway
mount_configuration: none
partition_table:
  type: "gpt"
  uuid: "00000000-0000-4000-a000-000000000001"
  # Below we tell osbuild to reserve the last 2048 blocks which
  # are needed for CoreOS that move the second header at the end
  # of the disk.
  # See https://github.com/coreos/fedora-coreos-config/blob/7fbf510367d495529d2a915707b547d4c663f609/overlay.d/05core/usr/lib/dracut/modules.d/35coreos-ignition/coreos-gpt-setup.sh#L30
  extra_padding: 1031168
  partitions:
    # BIOS Boot partition (boot legacy)
    - size: "1 MiB"
      bootable: true
      type: 21686148-6449-6E6F-744E-656564454649

    # EFI System Partition
    - size: "127 MiB"
      type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
      payload_type: "filesystem"
      payload:
        type: "vfat"
        mountpoint: "/boot/efi"
        label: "EFI-SYSTEM"
        fstab_options: "umask=0077,shortname=winnt"
        fstab_freq: 0
        fstab_passno: 2

    # Boot partition (xbootldr type)
    - size: "384 MiB"
      type: BC13C2FF-59E6-4262-A352-B275FD6F7172
      payload_type: "filesystem"
      label: "boot"
      payload:
        type: "ext4"
        uuid: "96d15588-3596-4b3c-adca-a2ff7279ea63"
        mountpoint: "/boot"
        label: "boot"
        fstab_options: "defaults"
        fstab_freq: 0
        fstab_passno: 0

    # Root partition (type root-x86_64)
    - type: 4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709
      label: "root"
      payload_type: "filesystem"
      payload:
        type: "xfs"
        uuid: "910678ff-f77e-4a7d-8d53-86f2ac47a823"
        mountpoint: "/"
        label: "root"
        fstab_options: "defaults"
        fstab_freq: 0
        fstab_passno: 0
