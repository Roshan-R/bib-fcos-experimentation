# inspired from https://github.com/osbuild/images/blob/main/data/distrodefs/bootc-generic/imagetypes.yaml

.common:
  #kernel_options:
  #  bootc_kernel_options: &bootc_kernel_options
  #    - ignition.firstboot
  #    - rw
  #    - console=tty0
  #    - console=ttyS0

  partitioning:
    guids:
      - &bios_boot_guid "21686148-6449-6E6F-744E-656564454649"
      - &efi_system_guid "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
      - &xbootldr_guid "BC13C2FF-59E6-4262-A352-B275FD6F7172"
      - &root_x86_64_guid "4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709"

partition_tables:
  default_bootc_partition_table: &default_coreos_partition_table
    x86_64:
      type: "gpt"
      uuid: "00000000-0000-4000-a000-000000000001"
      partitions:
        # BIOS Boot partition (pour boot legacy)
        - size: "1 MiB"
          bootable: true
          type: *bios_boot_guid

        # EFI System Partition
        - size: "127 MiB"
          type: *efi_system_guid
          payload_type: "filesystem"
          payload:
            type: "vfat"
            mountpoint: "/boot/efi"
            label: "EFI-SYSTEM"
            fstab_options: "umask=0077,shortname=winnt"
            fstab_freq: 0
            fstab_passno: 2

        # Boot partition (xbootldr type)
        - size: "384 MiB"
          type: *xbootldr_guid
          payload_type: "filesystem"
          payload:
            type: "ext4"
            uuid: "96d15588-3596-4b3c-adca-a2ff7279ea63"
            mountpoint: "/boot"
            label: "boot"
            fstab_options: "defaults"
            fstab_freq: 0
            fstab_passno: 0

        # Root partition (type root-x86_64)
        - type: *root_x86_64_guid
          payload_type: "filesystem"
          payload:
            type: "xfs"
            uuid: "910678ff-f77e-4a7d-8d53-86f2ac47a823"
            mountpoint: "/"
            label: "root"
            fstab_options: "defaults"
            fstab_freq: 0
            fstab_passno: 0

image_types:
  "raw": &raw_image_type
    filename: "disk.raw"
    image_func: "bootc_disk"
    mime_type: "application/octet-stream"
    bootable: true
    mount_units: false
    default_size: "10 GiB"
    exports: ["image"]
    #required_partition_sizes: *default_required_dir_sizes
    partition_table: *default_coreos_partition_table
    #image_config:
    #  kernel_options: *bootc_kernel_options

  "qcow2":
    <<: *raw_image_type
    filename: "disk.qcow2"
    mime_type: "application/x-qemu-disk"
    exports: ["qcow2"]
