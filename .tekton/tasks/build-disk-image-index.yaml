apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-disk-image-index
  labels:
    app.kubernetes.io/version: "0.2"
    build.appstudio.redhat.com/build_type: disk-image
  annotations:
    tekton.dev/tags: "image-build, konflux, fcos"
    tekton.dev/description: >
      Create a multi-arch OCI index from individual disk image artifact tags.

      This task takes individual artifact tag references (pushed by the
      image-builder task) and assembles them into a single OCI manifest index.
      Each artifact was pushed with an OCI config JSON carrying platform
      metadata (os=<artifact>, architecture=<arch>), so the final index
      allows pulling specific artifacts with:
        oras pull --platform qemu/amd64 <registry>/<repo>:<tag>
        oras pull --platform metal/arm64 <registry>/<repo>:<tag>

      Inspired by Konflux build-image-index task but adapted for disk image
      artifacts with custom platform metadata.
spec:
  params:
    - name: IMAGE
      type: string
      description: >
        The target image and tag where the final OCI index will be pushed.
        e.g. quay.io/coreos/fcos-disk:rawhide

    - name: IMAGES
      type: array
      description: >
        List of artifact tag references to include in the index.
        Each element can be a single tag or a comma-separated list of tags
        (as produced by the image-builder task's ARTIFACT_TAGS result).
        For example: ["repo:tag-qemu,repo:tag-metal", "repo:tag-aws"]
        All tags are flattened into a single list before creating the index.
        Each tag must already exist in the registry and carry platform
        metadata via its OCI config JSON.

    - name: TLSVERIFY
      type: string
      default: "true"
      description: >
        Verify TLS on the registry endpoint.

    - name: ALWAYS_BUILD_INDEX
      type: string
      default: "true"
      description: >
        Build an image index even if IMAGES contains only one element.
        If false and only one image is provided, that image reference is
        forwarded directly to the results.

    - name: ORAS_IMAGE
      type: string
      default: "ghcr.io/oras-project/oras:v1.3.0@sha256:6ce045ce069a89934d6666b8b49f9c4c0145201bd6de6dbe2aee267814c55468"
      description: >
        OCI image for the oras CLI tool.

  results:
    - name: IMAGE_DIGEST
      description: Digest of the OCI index just built.
    - name: IMAGE_URL
      description: Image repository and tag where the built index was pushed.
    - name: IMAGE_REF
      description: >
        Image reference of the built index containing both the repository
        and the digest (e.g. quay.io/org/repo@sha256:abc123...).
    - name: IMAGES
      description: >
        Comma-separated list of all artifact tags referenced by the index.

  stepTemplate:
    env:
      - name: IMAGE
        value: $(params.IMAGE)
      - name: TLSVERIFY
        value: $(params.TLSVERIFY)
      - name: ALWAYS_BUILD_INDEX
        value: $(params.ALWAYS_BUILD_INDEX)
      - name: ORAS_IMAGE
        value: $(params.ORAS_IMAGE)

  steps:
    - name: build-index
      image: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
      computeResources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
      args: ["$(params.IMAGES[*])"]
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "=== Build Disk Image Index ==="
        echo "IMAGE: ${IMAGE}"
        echo "TLSVERIFY: ${TLSVERIFY}"
        echo "ALWAYS_BUILD_INDEX: ${ALWAYS_BUILD_INDEX}"
        echo "Input arguments: $@"

        # Flatten comma-separated artifact tags into a single array.
        # Each argument may be a single tag or a CSV list from image-builder's
        # ARTIFACT_TAGS result (e.g. "repo:tag-qemu,repo:tag-metal").
        ARTIFACT_TAGS=()
        for arg in "$@"; do
          IFS=',' read -ra TAGS <<< "${arg}"
          ARTIFACT_TAGS+=("${TAGS[@]}")
        done
        TAG_COUNT=${#ARTIFACT_TAGS[@]}

        echo "Flattened artifact tags (${TAG_COUNT}):"
        printf '  - %s\n' "${ARTIFACT_TAGS[@]}"

        # Build TLS args
        TLS_ARGS=""
        if [ "${TLSVERIFY}" != "true" ]; then
          TLS_ARGS="--insecure"
        fi

        # Handle single tag case
        if [ "${TAG_COUNT}" -eq 1 ] && [ "${ALWAYS_BUILD_INDEX}" != "true" ]; then
          echo "Only one artifact tag provided and ALWAYS_BUILD_INDEX is not true."
          echo "Forwarding single artifact reference to results."

          SINGLE_TAG="${ARTIFACT_TAGS[0]}"

          # Fetch the digest
          TAG_DIGEST=$(podman run --rm \
            -v "$HOME/.docker:/root/.docker:ro" \
            "${ORAS_IMAGE}" \
            manifest fetch ${TLS_ARGS} "${SINGLE_TAG}" --descriptor | jq -r '.digest')

          echo -n "${SINGLE_TAG}" | tee "$(results.IMAGE_URL.path)"
          echo -n "${TAG_DIGEST}" | tee "$(results.IMAGE_DIGEST.path)"
          echo -n "${SINGLE_TAG}@${TAG_DIGEST}" | tee "$(results.IMAGE_REF.path)"
          echo -n "${SINGLE_TAG}" | tee "$(results.IMAGES.path)"
          exit 0
        fi

        echo "=== Creating OCI index from ${TAG_COUNT} artifact tags ==="

        # Create the index directly from individual artifact tags.
        # Each artifact tag was pushed with an OCI config JSON containing
        # platform metadata (architecture, os), so oras manifest index create
        # will pick up the platform info automatically.
        #
        # This is equivalent to the manual step:
        #   oras manifest index create <target> <tag1> <tag2> ...

        echo "Creating index at ${IMAGE} from: ${ARTIFACT_TAGS[*]}"

        podman run --rm \
          -v "$HOME/.docker:/root/.docker:ro" \
          "${ORAS_IMAGE}" \
          manifest index create ${TLS_ARGS} \
          "${IMAGE}" \
          "${ARTIFACT_TAGS[@]}"

        echo "=== Index created at ${IMAGE} ==="

        # Get the index digest
        INDEX_DIGEST=$(podman run --rm \
          -v "$HOME/.docker:/root/.docker:ro" \
          "${ORAS_IMAGE}" \
          manifest fetch ${TLS_ARGS} "${IMAGE}" --descriptor | jq -r '.digest')

        echo "INDEX_DIGEST: ${INDEX_DIGEST}"

        # Write results
        echo -n "${IMAGE}" | tee "$(results.IMAGE_URL.path)"
        echo -n "${INDEX_DIGEST}" | tee "$(results.IMAGE_DIGEST.path)"
        echo -n "${IMAGE}@${INDEX_DIGEST}" | tee "$(results.IMAGE_REF.path)"

        # Build comma-separated list of artifact tags
        IMAGES_CSV=$(IFS=,; echo "${ARTIFACT_TAGS[*]}")
        echo -n "${IMAGES_CSV}" | tee "$(results.IMAGES.path)"

        echo ""
        echo "=== Done ==="
