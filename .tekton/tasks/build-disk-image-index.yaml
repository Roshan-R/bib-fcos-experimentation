apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-disk-image-index
  labels:
    app.kubernetes.io/version: "0.2"
    build.appstudio.redhat.com/build_type: disk-image
  annotations:
    tekton.dev/tags: "image-build, konflux, fcos"
    tekton.dev/description: >
      Create an OCI index from image references (disk images and containers).

      This task takes image references (pushed by the image-builder task)
      and assembles them into a single OCI manifest index. The IMAGES list
      may contain both disk image ORAS artifacts (with custom platform
      metadata os=<artifact>, architecture=<arch>) and regular container
      images (with native platform os=linux, architecture=<arch>).

      The final index allows pulling specific entries with:
        oras pull --platform qemu/amd64 <registry>/<repo>:<tag>   (disk image)
        oras pull --platform metal/arm64 <registry>/<repo>:<tag>  (disk image)
        podman pull --platform linux/amd64 <registry>/<repo>:<tag> (container)

      Inspired by Konflux build-image-index task but adapted for mixed
      disk image artifacts and container images.
spec:
  params:
    - name: IMAGE
      type: string
      description: >
        The target image and tag where the final OCI index will be pushed.
        e.g. quay.io/coreos/fcos-disk:rawhide

    - name: IMAGES
      type: array
      description: >
        List of image references to include in the index.
        Each element can be a single tag/pullspec or a comma-separated list
        (as produced by the image-builder task's ARTIFACT_TAGS result).
        For example: ["repo:tag-qemu,repo:tag-metal,quay.io/fedora/fedora-coreos:rawhide"]
        All references are flattened into a single list before creating
        the index. Each reference must already exist in its registry.

    - name: TLSVERIFY
      type: string
      default: "true"
      description: >
        Verify TLS on the registry endpoint.

    - name: ALWAYS_BUILD_INDEX
      type: string
      default: "true"
      description: >
        Build an image index even if IMAGES contains only one element.
        If false and only one image is provided, that image reference is
        forwarded directly to the results.

  results:
    - name: IMAGE_DIGEST
      description: Digest of the OCI index just built.
    - name: IMAGE_URL
      description: Image repository and tag where the built index was pushed.
    - name: IMAGE_REF
      description: >
        Image reference of the built index containing both the repository
        and the digest (e.g. quay.io/org/repo@sha256:abc123...).
    - name: IMAGES
      description: >
        Comma-separated list of all artifact tags referenced by the index.

  stepTemplate:
    env:
      - name: IMAGE
        value: $(params.IMAGE)
      - name: TLSVERIFY
        value: $(params.TLSVERIFY)
      - name: ALWAYS_BUILD_INDEX
        value: $(params.ALWAYS_BUILD_INDEX)

  steps:
    - name: build-index
      image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
      computeResources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
      args: ["$(params.IMAGES[*])"]
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "=== Build Disk Image Index ==="
        echo "IMAGE: ${IMAGE}"
        echo "TLSVERIFY: ${TLSVERIFY}"
        echo "ALWAYS_BUILD_INDEX: ${ALWAYS_BUILD_INDEX}"
        echo "Input arguments: $@"

        # Flatten comma-separated tags into a single array.
        # Each argument may be a single ref or a CSV list from image-builder's
        # ARTIFACT_TAGS result (e.g. "repo:tag-qemu,repo:tag-metal,quay.io/fedora/fedora-coreos:rawhide").
        ARTIFACT_TAGS=()
        for arg in "$@"; do
          IFS=',' read -ra TAGS <<< "${arg}"
          ARTIFACT_TAGS+=("${TAGS[@]}")
        done
        TAG_COUNT=${#ARTIFACT_TAGS[@]}

        echo "Flattened image references (${TAG_COUNT}):"
        printf '  - %s\n' "${ARTIFACT_TAGS[@]}"

        # Build TLS args
        TLS_ARGS=""
        if [ "${TLSVERIFY}" != "true" ]; then
          TLS_ARGS="--insecure"
        fi

        # Login to registry with oras
        # Quay registries require explicit oras login before pushing.
        REGISTRY_HOST=$(echo "${IMAGE}" | cut -d'/' -f1)
        REGISTRY_PATH="${IMAGE%%:*}"
        echo "=== Logging into registry ${REGISTRY_HOST} with oras ==="
        echo "Looking up auth for: ${REGISTRY_PATH}"

        DOCKER_CONFIG="$HOME/.docker/config.json"
        AUTH_B64=$(jq -r ".auths[\"${REGISTRY_PATH}\"].auth // empty" "${DOCKER_CONFIG}")

        if [ -n "${AUTH_B64}" ]; then
          AUTH_DECODED=$(echo "${AUTH_B64}" | base64 -d)
          ORAS_USER="${AUTH_DECODED%%:*}"
          ORAS_PASS="${AUTH_DECODED#*:}"

          echo "${ORAS_PASS}" | oras login \
            --registry-config "${DOCKER_CONFIG}" \
            --username "${ORAS_USER}" \
            --password-stdin \
            "${REGISTRY_HOST}"
          echo "Login successful."
        else
          echo "WARNING: No auth found for ${REGISTRY_PATH} in ${DOCKER_CONFIG}"
          echo "Available registries:"
          jq -r '.auths | keys[]' "${DOCKER_CONFIG}"
        fi

        # Handle single tag case
        if [ "${TAG_COUNT}" -eq 1 ] && [ "${ALWAYS_BUILD_INDEX}" != "true" ]; then
          echo "Only one image reference provided and ALWAYS_BUILD_INDEX is not true."
          echo "Forwarding single reference to results."

          SINGLE_TAG="${ARTIFACT_TAGS[0]}"

          # Fetch the digest
          TAG_DIGEST=$(oras manifest fetch --registry-config "$HOME/.docker/config.json" ${TLS_ARGS} "${SINGLE_TAG}" --descriptor | jq -r '.digest')

          echo -n "${SINGLE_TAG}" | tee "$(results.IMAGE_URL.path)"
          echo -n "${TAG_DIGEST}" | tee "$(results.IMAGE_DIGEST.path)"
          echo -n "${SINGLE_TAG}@${TAG_DIGEST}" | tee "$(results.IMAGE_REF.path)"
          echo -n "${SINGLE_TAG}" | tee "$(results.IMAGES.path)"
          exit 0
        fi

        echo "=== Creating OCI index from ${TAG_COUNT} image references ==="

        echo "Creating index at ${IMAGE} from: ${ARTIFACT_TAGS[*]}"

        oras manifest index create --registry-config "$HOME/.docker/config.json" ${TLS_ARGS} \
          "${IMAGE}" \
          "${ARTIFACT_TAGS[@]}"

        echo "=== Index created at ${IMAGE} ==="

        # Get the index digest
        INDEX_DIGEST=$(oras manifest fetch --registry-config "$HOME/.docker/config.json" ${TLS_ARGS} "${IMAGE}" --descriptor | jq -r '.digest')

        echo "INDEX_DIGEST: ${INDEX_DIGEST}"

        # Write results
        echo -n "${IMAGE}" | tee "$(results.IMAGE_URL.path)"
        echo -n "${INDEX_DIGEST}" | tee "$(results.IMAGE_DIGEST.path)"
        echo -n "${IMAGE}@${INDEX_DIGEST}" | tee "$(results.IMAGE_REF.path)"

        # Build comma-separated list of all references in the index
        IMAGES_CSV=$(IFS=,; echo "${ARTIFACT_TAGS[*]}")
        echo -n "${IMAGES_CSV}" | tee "$(results.IMAGES.path)"

        echo ""
        echo "=== Done ==="
