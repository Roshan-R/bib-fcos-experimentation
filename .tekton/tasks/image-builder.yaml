apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: image-builder
  labels:
    app.kubernetes.io/version: "0.2"
    build.appstudio.redhat.com/build_type: disk-image
  annotations:
    tekton.dev/tags: "image-build, konflux, fcos"
    tekton.dev/description: >
      Build multiple Fedora CoreOS disk images using image-builder-cli running
      on an arch-native remote VM provisioned by the Konflux multi-platform-controller.

      This task builds all artifacts defined in artifacts_config.yaml for a
      single architecture in the same VM. The artifact list is derived from
      default_artifacts.all merged with default_artifacts.<arch>. Each artifact
      is pushed individually as an OCI artifact with a config JSON carrying
      platform metadata (os=<artifact>, architecture=<arch>).

      Blueprints and disk layout are read directly from the cloned repository.

      These merged blueprints are generated from the layered source files
      in blueprints/sources/ (shared/base.toml, shared/<arch>.toml,
      <ARTIFACT>/<arch>.toml) by running
      ``.github/merge-blueprints.py --generate-all`` and must be
      committed to the repository. A GitHub Actions workflow verifies they
      stay in sync with the source layers.

      Each disk image is pushed as a separate OCI artifact with a tag of
      <OUTPUT_IMAGE>-<artifact> and an OCI config JSON containing the platform
      metadata (architecture, os). The build-disk-image-index task is then
      responsible for assembling these into a single OCI index.

      Artifacts without blueprints for the target arch are silently skipped.
      If one artifact fails to build, the task continues with the others (best-effort).
      The task fails only if no artifacts are successfully built.

spec:
  params:
    - name: PLATFORM
      type: string
      description: >
        Target platform in OCI format, e.g. "linux/amd64" or "linux/arm64".
        Must match a platform configured in the multi-platform-controller.
        Supported values: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x.
        The arch component is translated to Fedora naming (x86_64, aarch64, etc.)
        and used to locate disk/<arch>.yaml and <artifact>/<arch>.toml.

    - name: SOURCE_IMAGE
      type: string
      description: >
        Fully qualified pullspec of the FCOS bootc container image to build
        the disk image from. This should be the image produced by the
        build-container-image task, e.g.
        quay.io/redhat-user-workloads/coreos-tenant/fcos-bootc:tag@sha256:...

    - name: OUTPUT_IMAGE
      type: string
      description: >
        Target OCI image reference where the OCI index will be pushed.
        Individual artifacts are pushed with temporary tags (<OUTPUT_IMAGE>-<artifact>)
        and then combined into the final index at OUTPUT_IMAGE.
        e.g. quay.io/redhat-user-workloads/fcos-tenant/fcos-disk:rawhide

    - name: ORAS_IMAGE
      type: string
      default: "ghcr.io/oras-project/oras:v1.3.0@sha256:6ce045ce069a89934d6666b8b49f9c4c0145201bd6de6dbe2aee267814c55468"
      description: >
        OCI image for the oras CLI tool, used to push artifacts with custom
        platform metadata and create the OCI index.

    - name: SOURCE_ARTIFACT
      type: string
      description: >
        OCI Trusted Artifact reference produced by git-clone-oci-ta. The task
        extracts the repository source from this artifact before SSHing to the
        remote VM.

    - name: IMAGE_BUILDER_CONFIG_FILE
      type: string
      default: "image-builder-config.yaml"
      description: >
        Path (relative to the repo root) to a YAML config file containing
        image pullspecs for the build. Expected keys:
          image-builder-cli: <pullspec>   — image-builder-cli container image
          builder-image: <pullspec>       — bootc builder image (--bootc-build-ref)
        This file is the single source of truth for image references,
        making it easy for MintMaker to bump digests automatically.

    - name: ARTIFACTS_FILE
      type: string
      default: "artifacts_config.yaml"
      description: >
        Path (relative to the repo root) to the pipeline config file containing
        the default_artifacts map. The artifact list for the target architecture
        is derived from default_artifacts.all merged with default_artifacts.<arch>.
        Artifacts without blueprints for the target arch are silently skipped.

    - name: OUTPUT_NAME
      type: string
      description: >
        Base name for the produced disk image file, passed to
        image-builder-cli via --output-name (e.g. "fedora-coreos-rawhide").

    - name: STORAGE_DRIVER
      type: string
      default: vfs
      description: Storage driver to configure for buildah when pushing results.

  results:
    - name: IMAGE_URL
      description: >
        Base image repository and tag (OUTPUT_IMAGE). Individual artifacts
        are pushed as <IMAGE_URL>-<artifact> (e.g. repo:tag-qemu).
    - name: ARTIFACT_TAGS
      description: >
        Comma-separated list of image references for the OCI index.
        Includes individual disk image artifact tags pushed to the registry
        (e.g. repo:tag-qemu,repo:tag-metal) and the SOURCE_IMAGE container
        pullspec. Used by build-disk-image-index to assemble the final
        manifest index.
    - name: BUILD_REPORT
      description: >
        JSON object reporting the build status of each artifact:
        {"built": ["qemu", "metal"], "skipped": ["aws"], "failed": []}

  stepTemplate:
    env:
      - name: PLATFORM
        value: $(params.PLATFORM)
      - name: SOURCE_IMAGE
        value: $(params.SOURCE_IMAGE)
      - name: OUTPUT_IMAGE
        value: $(params.OUTPUT_IMAGE)
      - name: IMAGE_BUILDER_CONFIG_FILE
        value: $(params.IMAGE_BUILDER_CONFIG_FILE)
      - name: OUTPUT_NAME
        value: $(params.OUTPUT_NAME)
      - name: STORAGE_DRIVER
        value: $(params.STORAGE_DRIVER)
      - name: ORAS_IMAGE
        value: $(params.ORAS_IMAGE)
      - name: ARTIFACTS_FILE
        value: $(params.ARTIFACTS_FILE)
    volumeMounts:
      - name: workdir
        mountPath: /var/workdir

  steps:
    # -------------------------------------------------------------------------
    # 1. Fetch the cloned repository from the OCI Trusted Artifact.
    # -------------------------------------------------------------------------
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:59d4997c0d4ebfb2a93f52a942cae109b934c3dcac8a5252639ac8418f070783
      computeResources:
        limits:
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 64Mi
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source

    # -------------------------------------------------------------------------
    # 2. Parse config files and export variables for the build.
    # -------------------------------------------------------------------------
    - name: validate-config
      image: quay.io/konflux-ci/task-runner:1.7.0@sha256:1c0582a85dae0949f3ec94aca95695c5d7698b371f1b76c5a78822a6249073dc
      computeResources:
        limits:
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 64Mi
      script: |
        #!/bin/bash
        set -euo pipefail

        # ------------------------------------------------------------------
        # Parse image-builder-config.yaml for image pullspecs
        # ------------------------------------------------------------------
        CONFIG="/var/workdir/source/${IMAGE_BUILDER_CONFIG_FILE}"
        echo "Reading image-builder config from: ${CONFIG}"

        if [ ! -f "${CONFIG}" ]; then
          echo "ERROR: config file not found: ${CONFIG}"
          exit 1
        fi

        cat "${CONFIG}"

        IBC_IMAGE=$(yq -r '.image-builder-cli' "${CONFIG}")
        BUILDER_IMAGE=$(yq -r '.builder-image' "${CONFIG}")

        for key in IBC_IMAGE BUILDER_IMAGE; do
          val="${!key}"
          if [ -z "${val}" ] || [ "${val}" = "null" ]; then
            echo "ERROR: missing or empty key in ${CONFIG}: ${key}"
            exit 1
          fi
        done

        echo "declare IBC_IMAGE=${IBC_IMAGE}" > /var/workdir/config-vars
        echo "declare BUILDER_IMAGE=${BUILDER_IMAGE}" >> /var/workdir/config-vars
        echo "Image-builder config validated:"
        cat /var/workdir/config-vars

        # ------------------------------------------------------------------
        # Parse artifacts_config.yaml for the artifact list
        # Merge default_artifacts.all with default_artifacts.<arch>
        # ------------------------------------------------------------------
        OCI_ARCH="${PLATFORM##*/}"
        case "${OCI_ARCH}" in
          amd64) ARCH="x86_64"  ;;
          arm64) ARCH="aarch64" ;;
          *)     ARCH="${OCI_ARCH}" ;;
        esac

        PIPELINE_CONFIG="/var/workdir/source/${ARTIFACTS_FILE}"
        echo "Reading pipeline config from: ${PIPELINE_CONFIG}"

        if [ ! -f "${PIPELINE_CONFIG}" ]; then
          echo "ERROR: pipeline config file not found: ${PIPELINE_CONFIG}"
          exit 1
        fi

        # Merge .default_artifacts.all and .default_artifacts.<arch> into a
        # single newline-separated list, then write it to artifacts.txt
        yq -r '
          (.default_artifacts.all // []) +
          (.default_artifacts["'"${ARCH}"'"] // [])
          | .[]
        ' "${PIPELINE_CONFIG}" > /var/workdir/artifacts.txt

        echo "Artifacts to build for ${ARCH}:"
        cat /var/workdir/artifacts.txt

    # -------------------------------------------------------------------------
    # 3. Build and push multiple disk images on the arch-native remote VM.
    # -------------------------------------------------------------------------
    - name: build
      image: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
      computeResources:
        limits:
          memory: 128Mi
        requests:
          cpu: 250m
          memory: 128Mi
      volumeMounts:
        - name: ssh
          mountPath: /ssh
          readOnly: true
      script: |
        #!/bin/bash
        set -e
        set -o verbose
        set -x

        # ------------------------------------------------------------------
        # Load IBC_IMAGE and BUILDER_IMAGE from validated config
        # ------------------------------------------------------------------
        source /var/workdir/config-vars

        # ------------------------------------------------------------------
        # Resolve arch from platform (linux/amd64 → amd64)
        # ------------------------------------------------------------------
        OCI_ARCH="${PLATFORM##*/}"

        # ------------------------------------------------------------------
        # Translate OCI arch names to Fedora/RPM arch names for file paths
        # ------------------------------------------------------------------
        case "${OCI_ARCH}" in
          amd64) ARCH="x86_64"  ;;
          arm64) ARCH="aarch64" ;;
          *)     ARCH="${OCI_ARCH}" ;;  # ppc64le, s390x are the same
        esac

        # ------------------------------------------------------------------
        # Set up SSH access to the remote VM
        # ------------------------------------------------------------------
        echo "[$(date --utc -Ins)] Prepare connection"

        mkdir -p ~/.ssh
        ls -la /ssh
        find /ssh
        if [ -e "/ssh/error" ]; then
          #no server could be provisioned
          cat /ssh/error
          exit 1
        elif [ -e "/ssh/otp" ]; then
          curl --cacert /ssh/otp-ca -XPOST -d @/ssh/otp $(cat /ssh/otp-server) >~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
        else
          cp /ssh/id_rsa ~/.ssh
        fi
        chmod 0400 ~/.ssh/id_rsa
        export SSH_HOST=$(cat /ssh/host)
        export BUILD_DIR="$(cat /ssh/user-dir)/disk-images"
        export SSH_ARGS=(-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i ~/.ssh/id_rsa)
        mkdir -p scripts
        echo "$BUILD_DIR"
        ssh "${SSH_ARGS[@]}" "$SSH_HOST" mkdir -p "$BUILD_DIR/workspaces" "$BUILD_DIR/scripts" "$BUILD_DIR/tmp" "$BUILD_DIR/tekton-results" "$BUILD_DIR/entitlement" "$BUILD_DIR/activation-key"

        if [ ! -n "${CONFIG_TOML_FILE}" ]; then
          echo "No CONFIG_TOML_FILE specified"
          export CONFIG_TOML_FILE=config.toml
          if [ -f /var/workdir/source/config.toml ]; then
            echo "Using the config.toml file found in the repository root!"
            echo "  Remove the config.toml file or set params.CONFIG_TOML_FILE to another file to prevent using config.toml."
          else
            echo "No config.toml file found. Using an empty configuration."
            touch /var/workdir/source/$CONFIG_TOML_FILE
          fi
        fi
        echo "Using the following config.toml file $CONFIG_TOML_FILE:"
        cat /var/workdir/source/$CONFIG_TOML_FILE

        rsync -e "ssh ${SSH_ARGS[*]}" -ra "/var/workdir/source/$CONFIG_TOML_FILE" "$SSH_HOST:$BUILD_DIR/config.toml"
        rsync -e "ssh ${SSH_ARGS[*]}" -ra "$HOME/.docker/" "$SSH_HOST:$BUILD_DIR/.docker/"
        # Rsync activation-key for remote registration or entitlement certificates if provided
        if [ -e "/activation-key/org" ]; then
          echo "Syncing activation-key for remote registration"
          rsync -e "ssh ${SSH_ARGS[*]}" -ra /activation-key/ "$SSH_HOST:$BUILD_DIR/activation-key/"
        elif [ -d "/entitlement" ] && [ "$(ls -A /entitlement)" ]; then
          echo "Syncing provided entitlement certificates"
          rsync -e "ssh ${SSH_ARGS[*]}" -ra /entitlement/ "$SSH_HOST:$BUILD_DIR/entitlement/"
        fi

        echo "ARCH: '${ARCH}'"
        echo "OCI_ARCH: '${OCI_ARCH}'"

        rsync -e "ssh ${SSH_ARGS[*]}" -ra /var/workdir/artifacts.txt "$SSH_HOST:$BUILD_DIR/artifacts.txt"

        # Variables that expand locally (build-time):
        cat > scripts/script-build.sh << REMOTESSHEOF
        #!/bin/bash
        set -uo pipefail

        export BUILD_DIR="${BUILD_DIR}"
        export OUTPUT_IMAGE="${OUTPUT_IMAGE}"
        export SOURCE_IMAGE="${SOURCE_IMAGE}"
        export BUILDER_IMAGE="${BUILDER_IMAGE}"
        export OUTPUT_NAME="${OUTPUT_NAME}"
        export IBC_IMAGE="${IBC_IMAGE}"
        export ORAS_IMAGE="${ORAS_IMAGE}"
        export ARCH="${ARCH}"
        export OCI_ARCH="${OCI_ARCH}"

        REMOTESSHEOF

        # Variables that must expand on the remote VM (runtime):
        cat >> scripts/script-build.sh << 'REMOTESSHEOF'

        REPO_DIR="${BUILD_DIR}/workspaces/source"

        # Read artifacts list
        mapfile -t ARTIFACTS < "${BUILD_DIR}/artifacts.txt"

        echo "=== Build Configuration ==="
        echo "SOURCE_IMAGE:   ${SOURCE_IMAGE}"
        echo "BUILDER_IMAGE:  ${BUILDER_IMAGE}"
        echo "OUTPUT_IMAGE:   ${OUTPUT_IMAGE}"
        echo "OUTPUT_NAME:    ${OUTPUT_NAME}"
        echo "ARCH:           ${ARCH}"
        echo "OCI_ARCH:       ${OCI_ARCH}"
        echo "ARTIFACTS:      ${ARTIFACTS[*]}"

        # Pull all container images to ensure we always use the latest versions.
        # The remote VM may have stale cached images from previous runs.
        sudo podman pull --authfile="${BUILD_DIR}/.docker/config.json" "${IBC_IMAGE}"
        sudo podman pull --authfile="${BUILD_DIR}/.docker/config.json" "${SOURCE_IMAGE}"
        sudo podman pull --authfile="${BUILD_DIR}/.docker/config.json" "${BUILDER_IMAGE}"
        sudo podman pull --authfile="${BUILD_DIR}/.docker/config.json" "${ORAS_IMAGE}"

        # ------------------------------------------------------------------
        # Extract labels from SOURCE_IMAGE to forward as OCI annotations
        # on the disk image artifacts.
        # ------------------------------------------------------------------
        echo "=== Extracting labels from SOURCE_IMAGE ==="
        CONFIG_COMMIT=$(sudo podman inspect --format '{{index .Config.Labels "vcs-ref"}}' "${SOURCE_IMAGE}" 2>/dev/null || echo "")
        CONFIG_GIT_URL=$(sudo podman inspect --format '{{index .Config.Labels "org.opencontainers.image.source"}}' "${SOURCE_IMAGE}" 2>/dev/null || echo "")
        CONFIG_GIT_REF=$(sudo podman inspect --format '{{index .Config.Labels "com.coreos.stream"}}' "${SOURCE_IMAGE}" 2>/dev/null || echo "")

        echo "CONFIG_COMMIT:  ${CONFIG_COMMIT}"
        echo "CONFIG_GIT_URL: ${CONFIG_GIT_URL}"
        echo "CONFIG_GIT_REF: ${CONFIG_GIT_REF}"

        # Build annotation flags for oras push (only include non-empty labels)
        ORAS_ANNOTATIONS=()
        if [ -n "${CONFIG_COMMIT}" ]; then
          ORAS_ANNOTATIONS+=(--annotation "vcs-ref=${CONFIG_COMMIT}")
        fi
        if [ -n "${CONFIG_GIT_URL}" ]; then
          ORAS_ANNOTATIONS+=(--annotation "org.opencontainers.image.source=${CONFIG_GIT_URL}")
        fi
        if [ -n "${CONFIG_GIT_REF}" ]; then
          ORAS_ANNOTATIONS+=(--annotation "com.coreos.stream=${CONFIG_GIT_REF}")
        fi

        # create the output dir (clean any leftovers from a previous run)
        rm -rf "${BUILD_DIR}/output"
        mkdir "${BUILD_DIR}/output"

        # Login to registry with oras
        # oras requires explicit login for Quay registries
        # Extract registry host and path from OUTPUT_IMAGE
        # e.g., quay.io/konflux-fedora/coreos-tenant/disk-images-rawhide:tag
        #   -> REGISTRY_HOST: quay.io
        #   -> REGISTRY_PATH: quay.io/konflux-fedora/coreos-tenant/disk-images-rawhide
        REGISTRY_HOST=$(echo "${OUTPUT_IMAGE}" | cut -d'/' -f1)
        REGISTRY_PATH="${OUTPUT_IMAGE%%:*}"
        echo "=== Logging into registry ${REGISTRY_HOST} with oras ==="
        echo "Looking up auth for: ${REGISTRY_PATH}"

        # Extract auth from config.json and decode it
        # The config.json has format: {"auths": {"quay.io/org/repo": {"auth": "base64(user:pass)"}}}
        AUTH_B64=$(jq -r ".auths[\"${REGISTRY_PATH}\"].auth // empty" "${BUILD_DIR}/.docker/config.json")

        if [ -n "${AUTH_B64}" ]; then
          AUTH_DECODED=$(echo "${AUTH_B64}" | base64 -d)
          ORAS_USER="${AUTH_DECODED%%:*}"
          ORAS_PASS="${AUTH_DECODED#*:}"

          echo "${ORAS_PASS}" | sudo podman run --rm -i \
            -v "${BUILD_DIR}/.docker:/root/.docker" \
            "${ORAS_IMAGE}" \
            login \
            --username "${ORAS_USER}" \
            --password-stdin \
            "${REGISTRY_HOST}"
        else
          echo "WARNING: No auth found for ${REGISTRY_PATH} in config.json"
          echo "Available registries:"
          jq -r '.auths | keys[]' "${BUILD_DIR}/.docker/config.json"
        fi

        # Initialize build report
        BUILD_REPORT='{"built":[],"skipped":[],"failed":[]}'
        BUILT_ARTIFACTS=()

        # ------------------------------------------------------------------
        # Build each artifact
        # ------------------------------------------------------------------
        for artifact in "${ARTIFACTS[@]}"; do
          echo ""
          echo "============================================================"
          echo "=== Processing artifact: ${artifact} for ${ARCH}"
          echo "============================================================"

          MERGED_BP="${REPO_DIR}/blueprints/generated/${artifact}-${ARCH}.toml"

          # Skip if no pre-generated blueprint for this arch
          if [ ! -f "${MERGED_BP}" ]; then
            echo "INFO: Skipping ${artifact} (no blueprint at ${MERGED_BP})"
            BUILD_REPORT=$(echo "$BUILD_REPORT" | jq -c ".skipped += [\"$artifact\"]")
            continue
          fi

          # Determine image type based on artifact
          case "${artifact}" in
            qemu)  IMAGE_TYPE="qcow2"; EXT="qcow2"; MEDIA_TYPE="application/vnd.diskimage.qcow2" ;;
            metal) IMAGE_TYPE="raw";   EXT="raw";   MEDIA_TYPE="application/vnd.diskimage.raw.gzip" ;;
            *)     IMAGE_TYPE="qcow2"; EXT="qcow2"; MEDIA_TYPE="application/vnd.diskimage.qcow2" ;;
          esac

          echo "IMAGE_TYPE: ${IMAGE_TYPE}"
          echo "MEDIA_TYPE: ${MEDIA_TYPE}"
          echo "=== Pre-merged blueprint for ${artifact} ==="
          cat "${MERGED_BP}"

          # Create output directory for this artifact
          OUTPUT_DIR="${BUILD_DIR}/output/${artifact}"
          rm -rf "${OUTPUT_DIR}"
          mkdir -p "${OUTPUT_DIR}"

          # Run image-builder-cli
          echo "=== Building ${artifact} disk image ==="
          if ! sudo podman run --rm --privileged --pull=never \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "${REPO_DIR}:/repo:ro" \
            -v "${OUTPUT_DIR}:/output" \
            "${IBC_IMAGE}" \
            build "${IMAGE_TYPE}" \
            --bootc-build-ref "${BUILDER_IMAGE}" \
            --bootc-ref "${SOURCE_IMAGE}" \
            --blueprint "/repo/blueprints/generated/${artifact}-${ARCH}.toml" \
            --output-dir /output \
            --output-name "${OUTPUT_NAME}" \
            --with-buildlog; then

            echo "ERROR: Failed to build ${artifact}"
            BUILD_REPORT=$(echo "$BUILD_REPORT" | jq -c ".failed += [\"$artifact\"]")
            continue  # Best-effort: continue with other artifacts
          fi

          echo "=== Build complete for ${artifact}, output contents ==="
          ls -lhR "${OUTPUT_DIR}/"

          # Find the disk image file
          DISK_FILE=$(find "${OUTPUT_DIR}" -name "*.${EXT}" -print -quit)
          if [ -z "${DISK_FILE}" ]; then
            echo "ERROR: No ${EXT} file found for ${artifact}"
            BUILD_REPORT=$(echo "$BUILD_REPORT" | jq -c ".failed += [\"$artifact\"]")
            continue
          fi

          # Push artifact with oras using a config JSON for platform metadata
          ARTIFACT_TAG="${OUTPUT_IMAGE}-${artifact}"
          echo "=== Pushing ${artifact} to ${ARTIFACT_TAG} with platform ${artifact}/${OCI_ARCH} ==="

          # Get just the filename for oras
          DISK_FILENAME=$(basename "${DISK_FILE}")

          # Generate OCI config JSON with platform metadata
          # This allows `oras pull --platform <artifact>/<arch>` to work
          CONFIG_FILE="${OUTPUT_DIR}/config-${artifact}-${OCI_ARCH}.json"
          cat > "${CONFIG_FILE}" <<CONFIGEOF
        {
          "architecture": "${OCI_ARCH}",
          "os": "${artifact}",
          "rootfs": {
            "type": "layers",
            "diff_ids": []
          },
          "config": {}
        }
        CONFIGEOF

          if ! sudo podman run --rm \
            -v "${OUTPUT_DIR}:/output:z" \
            -v "${BUILD_DIR}/.docker:/root/.docker:ro" \
            -w "/output" \
            "${ORAS_IMAGE}" \
            push \
            --registry-config /root/.docker/config.json \
            --artifact-type "${MEDIA_TYPE}" \
            --config "$(basename "${CONFIG_FILE}"):application/vnd.oci.image.config.v1+json" \
            "${ORAS_ANNOTATIONS[@]}" \
            "${ARTIFACT_TAG}" \
            "${DISK_FILENAME}"; then

            echo "ERROR: Failed to push ${artifact}"
            BUILD_REPORT=$(echo "$BUILD_REPORT" | jq -c ".failed += [\"$artifact\"]")
            continue
          fi

          echo "SUCCESS: ${artifact} pushed to ${ARTIFACT_TAG}"
          BUILD_REPORT=$(echo "$BUILD_REPORT" | jq -c ".built += [\"$artifact\"]")
          BUILT_ARTIFACTS+=("${artifact}")
        done

        echo ""
        echo "============================================================"
        echo "=== Build Summary ==="
        echo "============================================================"
        echo "$BUILD_REPORT" | jq .

        # Verify at least one artifact was built
        BUILT_COUNT=$(echo "$BUILD_REPORT" | jq '.built | length')
        if [ "$BUILT_COUNT" -eq 0 ]; then
          echo "ERROR: No artifacts built successfully"
          exit 1
        fi

        # ------------------------------------------------------------------
        # Write results
        # ------------------------------------------------------------------
        # Build comma-separated list: disk image artifact tags + SOURCE_IMAGE
        ARTIFACT_TAGS=()
        for artifact in "${BUILT_ARTIFACTS[@]}"; do
          ARTIFACT_TAGS+=("${OUTPUT_IMAGE}-${artifact}")
        done
        # Append the source container image so the index includes it
        ARTIFACT_TAGS+=("${SOURCE_IMAGE}")
        ARTIFACT_TAGS_CSV=$(IFS=,; echo "${ARTIFACT_TAGS[*]}")

        echo "=== Artifact tags: ${ARTIFACT_TAGS_CSV} ==="

        echo -n "${OUTPUT_IMAGE}" > "${BUILD_DIR}/tekton-results/IMAGE_URL"
        echo -n "${ARTIFACT_TAGS_CSV}" > "${BUILD_DIR}/tekton-results/ARTIFACT_TAGS"
        echo "$BUILD_REPORT" > "${BUILD_DIR}/tekton-results/BUILD_REPORT"

        echo "=== All done ==="

        REMOTESSHEOF

        # make scripts executable and sync them to the cloud VM
        chmod +x scripts/script-build.sh
        rsync -e "ssh ${SSH_ARGS[*]}" -ra scripts "$SSH_HOST:$BUILD_DIR"
        rsync -e "ssh ${SSH_ARGS[*]}" -ra /var/workdir/source/ "$SSH_HOST:$BUILD_DIR/workspaces/source/"

        ssh "${SSH_ARGS[@]}" "$SSH_HOST" "$BUILD_DIR/scripts/script-build.sh"
        rsync -e "ssh ${SSH_ARGS[*]}" -ra "$SSH_HOST:$BUILD_DIR/tekton-results/" "/tekton/results/"

        # ------------------------------------------------------------------
        # Clean up all build artifacts on the remote VM to prevent stale
        # files from interfering with subsequent runs (e.g. gzip refusing
        # to overwrite an existing .gz file).
        # ------------------------------------------------------------------
        echo "[$(date --utc -Ins)] Cleaning up build artifacts on remote VM"
        ssh "${SSH_ARGS[@]}" "$SSH_HOST" "rm -rf ${BUILD_DIR}/output ${BUILD_DIR}/workspaces ${BUILD_DIR}/scripts ${BUILD_DIR}/tekton-results ${BUILD_DIR}/config.toml ${BUILD_DIR}/.docker ${BUILD_DIR}/entitlement ${BUILD_DIR}/activation-key ${BUILD_DIR}/tmp"
        echo "[$(date --utc -Ins)] Cleanup complete"

  volumes:
    - name: workdir
      emptyDir: {}
    - name: ssh
      secret:
        optional: false
        #secretName: multi-platform-ssh-$(context.taskRun.name)
        secretName: own-custom-vm
