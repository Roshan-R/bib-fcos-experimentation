apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: image-builder
  labels:
    app.kubernetes.io/version: "0.1"
    build.appstudio.redhat.com/build_type: disk-image
  annotations:
    tekton.dev/tags: "image-build, konflux, fcos"
    tekton.dev/description: >
      Build a Fedora CoreOS disk image using image-builder-cli running on an
      arch-native remote VM provisioned by the Konflux multi-platform-controller.

      Blueprints and disk layout are read directly from the cloned repository.
      The arch is derived from the PLATFORM param, and the artifact name
      (e.g. "qemu", "metal") determines which subdirectory to read from:

        shared/blueprint.toml         — common config (merged first)
        shared/<arch>.toml            — arch-specific shared config (optional, merged second)
        <ARTIFACT>/<arch>.toml        — platform + console kargs (merged last)
        disk/<arch>.yaml              — partition table

      Before building, merge-blueprints.py merges the layered blueprint
      files into a single blueprint-merged.toml (concatenating kernel
      arguments) so that image-builder-cli receives one --blueprint flag.

      The produced disk image is wrapped as an OCI artifact and pushed to
      OUTPUT_IMAGE, with IMAGE_REFERENCE emitted as a task result so that the
      build-image-index task can assemble the multi-arch manifest.
spec:
  params:
    - name: PLATFORM
      type: string
      description: >
        Target platform in OCI format, e.g. "linux/amd64" or "linux/arm64".
        Must match a platform configured in the multi-platform-controller.
        Supported values: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x.
        The arch component is translated to Fedora naming (x86_64, aarch64, etc.)
        and used to locate disk/<arch>.yaml and <ARTIFACT>/<arch>.toml.

    - name: ARTIFACT
      type: string
      description: >
        Artifact type to build. Must match a top-level directory in the
        repository that contains per-arch blueprints (e.g. "qemu", "metal").
        Controls the image type passed to image-builder-cli and the blueprint
        path used.

    - name: SOURCE_IMAGE
      type: string
      description: >
        Fully qualified pullspec of the FCOS bootc container image to build
        the disk image from. This should be the image produced by the
        build-container-image task, e.g.
        quay.io/redhat-user-workloads/coreos-tenant/fcos-bootc:tag@sha256:...

    - name: OUTPUT_IMAGE
      type: string
      description: >
        Target OCI image reference where the disk image artifact will be pushed,
        with the platform suffix appended, e.g.
        quay.io/redhat-user-workloads/fcos-tenant/fcos-qemu:rawhide-linux-x86-64

    - name: IMAGE_APPEND_PLATFORM
      type: string
      default: "true"
      description: >
        Append a sanitised platform suffix to the OUTPUT_IMAGE tag
        (e.g. "-linux-x86-64"). Set to "false" when the tag already includes
        the arch.

    - name: SOURCE_ARTIFACT
      type: string
      description: >
        OCI Trusted Artifact reference produced by git-clone-oci-ta. The task
        extracts the repository source from this artifact before SSHing to the
        remote VM.

    - name: IMAGE_BUILDER_CONFIG_FILE
      type: string
      default: "image-builder-config.yaml"
      description: >
        Path (relative to the repo root) to a YAML config file containing
        image pullspecs for the build. Expected keys:
          image-builder-cli: <pullspec>   — image-builder-cli container image
          builder-image: <pullspec>       — bootc builder image (--bootc-build-ref)
        This file is the single source of truth for image references,
        making it easy for MintMaker to bump digests automatically.

    - name: OUTPUT_NAME
      type: string
      description: >
        Base name for the produced disk image file, passed to
        image-builder-cli via --output-name (e.g. "fedora-coreos-rawhide").

    - name: STORAGE_DRIVER
      type: string
      default: vfs
      description: Storage driver to configure for buildah when pushing results.

  results:
    - name: IMAGE_DIGEST
      description: Digest of the OCI artifact pushed to the registry.
    - name: IMAGE_URL
      description: Repository and tag where the OCI artifact was pushed.
    - name: IMAGE_REFERENCE
      description: >
        Full image reference (IMAGE_URL@IMAGE_DIGEST). Used by build-image-index
        to assemble the multi-arch manifest list.

  stepTemplate:
    env:
      - name: PLATFORM
        value: $(params.PLATFORM)
      - name: ARTIFACT
        value: $(params.ARTIFACT)
      - name: SOURCE_IMAGE
        value: $(params.SOURCE_IMAGE)
      - name: OUTPUT_IMAGE
        value: $(params.OUTPUT_IMAGE)
      - name: IMAGE_APPEND_PLATFORM
        value: $(params.IMAGE_APPEND_PLATFORM)
      - name: IMAGE_BUILDER_CONFIG_FILE
        value: $(params.IMAGE_BUILDER_CONFIG_FILE)
      - name: OUTPUT_NAME
        value: $(params.OUTPUT_NAME)
      - name: STORAGE_DRIVER
        value: $(params.STORAGE_DRIVER)
      - name: BUILDAH_IMAGE
        value: 'registry.access.redhat.com/ubi9/buildah:9.7-1777422883'
    volumeMounts:
      - name: workdir
        mountPath: /var/workdir

  steps:
    # -------------------------------------------------------------------------
    # 1. Fetch the cloned repository from the OCI Trusted Artifact.
    # -------------------------------------------------------------------------
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:77563b5fb4b82f9b6a47070ba06e60486567d34e03ea60cd5169be0be53ad5dc
      computeResources:
        limits:
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 64Mi
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source

    # -------------------------------------------------------------------------
    # 2. Parse image-builder config file and export variables for the build.
    # -------------------------------------------------------------------------
    - name: validate-config
      image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
      computeResources:
        limits:
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 64Mi
      script: |
        #!/bin/bash
        set -euo pipefail

        CONFIG="/var/workdir/source/${IMAGE_BUILDER_CONFIG_FILE}"
        echo "Reading config from: ${CONFIG}"

        if [ ! -f "${CONFIG}" ]; then
          echo "ERROR: config file not found: ${CONFIG}"
          exit 1
        fi

        cat "${CONFIG}"

        IBC_IMAGE=$(yq -r '.image-builder-cli' "${CONFIG}")
        BUILDER_IMAGE=$(yq -r '.builder-image' "${CONFIG}")

        for key in IBC_IMAGE BUILDER_IMAGE; do
          val="${!key}"
          if [ -z "${val}" ] || [ "${val}" = "null" ]; then
            echo "ERROR: missing or empty key in ${CONFIG}: ${key}"
            exit 1
          fi
        done

        echo "declare IBC_IMAGE=${IBC_IMAGE}" > /var/workdir/config-vars
        echo "declare BUILDER_IMAGE=${BUILDER_IMAGE}" >> /var/workdir/config-vars
        echo "Config validated:"
        cat /var/workdir/config-vars

    # -------------------------------------------------------------------------
    # 3. Build and push the disk image on the arch-native remote VM.
    # -------------------------------------------------------------------------
    - name: build
      image: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
      computeResources:
        limits:
          memory: 128Mi
        requests:
          cpu: 250m
          memory: 128Mi
      volumeMounts:
        - name: ssh
          mountPath: /ssh
          readOnly: true
      script: |
        #!/bin/bash
        set -e
        set -o verbose
        set -x

        # ------------------------------------------------------------------
        # Load IBC_IMAGE and BUILDER_IMAGE from validated config
        # ------------------------------------------------------------------
        source /var/workdir/config-vars

        # ------------------------------------------------------------------
        # Resolve arch from platform (linux/amd64 → amd64)
        # ------------------------------------------------------------------
        OCI_ARCH="${PLATFORM##*/}"

        # ------------------------------------------------------------------
        # Translate OCI arch names to Fedora/RPM arch names for file paths
        # ------------------------------------------------------------------
        case "${OCI_ARCH}" in
          amd64) ARCH="x86_64"  ;;
          arm64) ARCH="aarch64" ;;
          *)     ARCH="${OCI_ARCH}" ;;  # ppc64le, s390x are the same
        esac

        # ------------------------------------------------------------------
        # Resolve image-builder-cli image type from artifact name
        # ------------------------------------------------------------------
        case "${ARTIFACT}" in
          qemu)  IMAGE_TYPE="qcow2" ;;
          metal) IMAGE_TYPE="raw"   ;;
          *)
            echo "Unknown ARTIFACT '${ARTIFACT}'. Add it to the case statement."
            exit 1
            ;;
        esac

        # ------------------------------------------------------------------
        # Optionally append platform suffix to the output tag
        # ------------------------------------------------------------------
        if [ "${IMAGE_APPEND_PLATFORM}" = "true" ]; then
          OUTPUT_IMAGE="${OUTPUT_IMAGE}-${PLATFORM//[^a-zA-Z0-9]/-}"
        fi

        # ------------------------------------------------------------------
        # Set up SSH access to the remote VM
        # ------------------------------------------------------------------
        echo "[$(date --utc -Ins)] Prepare connection"

        mkdir -p ~/.ssh
        ls -la /ssh
        find /ssh
        if [ -e "/ssh/error" ]; then
          #no server could be provisioned
          cat /ssh/error
          exit 1
        elif [ -e "/ssh/otp" ]; then
          curl --cacert /ssh/otp-ca -XPOST -d @/ssh/otp $(cat /ssh/otp-server) >~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
        else
          cp /ssh/id_rsa ~/.ssh
        fi
        chmod 0400 ~/.ssh/id_rsa
        export SSH_HOST=$(cat /ssh/host)
        export BUILD_DIR="$(cat /ssh/user-dir)/${ARTIFACT}"
        export SSH_ARGS=(-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i ~/.ssh/id_rsa)
        mkdir -p scripts
        echo "$BUILD_DIR"
        ssh "${SSH_ARGS[@]}" "$SSH_HOST"  mkdir -p "$BUILD_DIR/workspaces" "$BUILD_DIR/scripts" "$BUILD_DIR/tmp" "$BUILD_DIR/tekton-results" "$BUILD_DIR/entitlement" "$BUILD_DIR/activation-key"

        if [ ! -n "${CONFIG_TOML_FILE}" ]; then
          echo "No CONFIG_TOML_FILE specified"
          export CONFIG_TOML_FILE=config.toml
          if [ -f /var/workdir/source/config.toml ]; then
            echo "Using the config.toml file found in the repository root!"
            echo "  Remove the config.toml file or set params.CONFIG_TOML_FILE to another file to prevent using config.toml."
          else
            echo "No config.toml file found. Using an empty configuration."
            touch /var/workdir/source/$CONFIG_TOML_FILE
          fi
        fi
        echo "Using the following config.toml file $CONFIG_TOML_FILE:"
        cat /var/workdir/source/$CONFIG_TOML_FILE

        rsync -e "ssh ${SSH_ARGS[*]}" -ra "/var/workdir/source/$CONFIG_TOML_FILE" "$SSH_HOST:$BUILD_DIR/config.toml"
        rsync -e "ssh ${SSH_ARGS[*]}" -ra "$HOME/.docker/" "$SSH_HOST:$BUILD_DIR/.docker/"
        # Rsync activation-key for remote registration or entitlement certificates if provided
        if [ -e "/activation-key/org" ]; then
          echo "Syncing activation-key for remote registration"
          rsync -e "ssh ${SSH_ARGS[*]}" -ra /activation-key/ "$SSH_HOST:$BUILD_DIR/activation-key/"
        elif [ -d "/entitlement" ] && [ "$(ls -A /entitlement)" ]; then
          echo "Syncing provided entitlement certificates"
          rsync -e "ssh ${SSH_ARGS[*]}" -ra /entitlement/ "$SSH_HOST:$BUILD_DIR/entitlement/"
        fi

        # ARCH was already computed above with OCI→Fedora translation
        echo "ARCH: '${ARCH}'"

        # form the --type arguments
        IMAGE_TYPE_ARGUMENT=" --type $IMAGE_TYPE "

        # Variables that expand locally (build-time):
        cat > scripts/script-build.sh << REMOTESSHEOF
        #!/bin/bash
        set -euxo pipefail

        export BUILD_DIR="${BUILD_DIR}"
        export OUTPUT_IMAGE="${OUTPUT_IMAGE}"
        export SOURCE_IMAGE="${SOURCE_IMAGE}"
        export BUILDER_IMAGE="${BUILDER_IMAGE}"
        export OUTPUT_NAME="${OUTPUT_NAME}"
        export IBC_IMAGE="${IBC_IMAGE}"
        export IMAGE_TYPE="${IMAGE_TYPE}"
        export ARCH="${ARCH}"
        export ARTIFACT="${ARTIFACT}"
        export BUILDAH_IMAGE="${BUILDAH_IMAGE}"
        export STORAGE_DRIVER="${STORAGE_DRIVER}"

        REMOTESSHEOF

        # Variables that must expand on the remote VM (runtime):
        cat >> scripts/script-build.sh << 'REMOTESSHEOF'

        REPO_DIR="${BUILD_DIR}/workspaces/source"
        SHARED_BP="${REPO_DIR}/shared/blueprint.toml"
        SHARED_ARCH_BP="${REPO_DIR}/shared/${ARCH}.toml"
        ARTIFACT_BP="${REPO_DIR}/${ARTIFACT}/${ARCH}.toml"
        MERGED_BP="${REPO_DIR}/blueprint-merged.toml"

        echo "=== Build inputs ==="
        echo "SOURCE_IMAGE:   ${SOURCE_IMAGE}"
        echo "BUILDER_IMAGE:  ${BUILDER_IMAGE}"
        echo "IMAGE_TYPE:     ${IMAGE_TYPE}"
        echo "OUTPUT_IMAGE:   ${OUTPUT_IMAGE}"
        echo "OUTPUT_NAME:    ${OUTPUT_NAME}"
        echo "Blueprint:      ${SHARED_BP}"
        echo "Arch blueprint: ${SHARED_ARCH_BP} (optional)"
        echo "Artifact bp:    ${ARTIFACT_BP}"

        for f in "${SHARED_BP}" "${ARTIFACT_BP}"; do
          if [ ! -f "${f}" ]; then
            echo "ERROR: required file not found: ${f}"
            exit 1
          fi
        done

        # Merge blueprints into a single file.
        # Order: shared base → shared arch-specific (optional) → artifact.
        BP_FILES=("${SHARED_BP}")
        if [ -f "${SHARED_ARCH_BP}" ]; then
          echo "Using shared arch blueprint: ${SHARED_ARCH_BP}"
          BP_FILES+=("${SHARED_ARCH_BP}")
        fi
        BP_FILES+=("${ARTIFACT_BP}")

        echo "Merging blueprints: ${BP_FILES[*]}"
        python3 "${REPO_DIR}/merge-blueprints.py" -o "${MERGED_BP}" "${BP_FILES[@]}"
        echo "=== Merged blueprint ==="
        cat "${MERGED_BP}"

        # Pull the image-builder-cli runner image
        podman pull --authfile="${BUILD_DIR}/.docker/config.json" "${IBC_IMAGE}"

        # create the output dir (clean any leftovers from a previous run)
        rm -rf "${BUILD_DIR}/output"
        mkdir "${BUILD_DIR}/output"

        # Run image-builder-cli inside a privileged container.
        sudo podman run --rm --privileged \
          -v /var/lib/containers/storage:/var/lib/containers/storage \
          -v "${BUILD_DIR}/workspaces/source:/repo:ro" \
          -v "${BUILD_DIR}/output:/output" \
          "${IBC_IMAGE}" \
            build "${IMAGE_TYPE}" \
            --bootc-build-ref "${BUILDER_IMAGE}" \
            --bootc-ref "${SOURCE_IMAGE}" \
            --blueprint "/repo/blueprint-merged.toml" \
            --output-dir /output \
            --output-name "${OUTPUT_NAME}" \
            --with-buildlog

        echo "=== Build complete, output contents ==="
        ls -lhR "${BUILD_DIR}/output/"

        # ------------------------------------------------------------------
        # Wrap the disk image as an OCI artifact and push it.
        # Run inside a container so we don't install anything on the VM.
        # ------------------------------------------------------------------
        sudo podman run --rm --privileged \
          -e "OUTPUT_IMAGE=${OUTPUT_IMAGE}" \
          -e "STORAGE_DRIVER=${STORAGE_DRIVER}" \
          -v "${BUILD_DIR}/output:/output" \
          -v "${BUILD_DIR}/.docker:/.docker:ro" \
          -v "${BUILD_DIR}/tekton-results:/tekton-results" \
          "${BUILDAH_IMAGE}" \
          /bin/bash -c '
        set -euxo pipefail

        dnf -y -q install jq skopeo

        buildah manifest create "${OUTPUT_IMAGE}"

        QCOW2_FILE="$(find /output -name "*.qcow2" -print -quit)"
        RAW_FILE="$(find /output -name "*.raw" -print -quit)"

        if [ -n "${QCOW2_FILE}" ]; then
          echo "Pushing qcow2 artifact: ${QCOW2_FILE}"
          buildah manifest add --arch "$(arch)" --os linux \
            --artifact --artifact-type application/vnd.diskimage.qcow2 \
            "${OUTPUT_IMAGE}" "${QCOW2_FILE}"

        elif [ -n "${RAW_FILE}" ]; then
          echo "Compressing and pushing raw artifact: ${RAW_FILE}"
          gzip "${RAW_FILE}"
          buildah manifest add --arch "$(arch)" --os linux \
            --artifact --artifact-type application/vnd.diskimage.raw.gzip \
            "${OUTPUT_IMAGE}" "${RAW_FILE}.gz"

        else
          echo "ERROR: no recognised disk image found under /output"
          ls -lhR /output
          exit 1
        fi

        buildah manifest push \
          --digestfile /tekton-results/image-index-digest \
          --authfile /.docker/config.json \
          --all "${OUTPUT_IMAGE}"

        INDEX_DIGEST="$(cat /tekton-results/image-index-digest)"
        REPO="${OUTPUT_IMAGE%:*}"
        MANIFEST_DIGEST="$(buildah manifest inspect --authfile /.docker/config.json "${REPO}@${INDEX_DIGEST}" \
          | jq -r ".manifests[0].digest")"

        skopeo copy \
          --authfile /.docker/config.json \
          "docker://${REPO}@${MANIFEST_DIGEST}" \
          "docker://${OUTPUT_IMAGE}"

        echo -n "${OUTPUT_IMAGE}"    | tee /tekton-results/IMAGE_URL
        echo -n "${MANIFEST_DIGEST}" | tee /tekton-results/IMAGE_DIGEST
        echo -n "${OUTPUT_IMAGE}@${MANIFEST_DIGEST}" | tee /tekton-results/IMAGE_REFERENCE
        '

        REMOTESSHEOF

        # make scripts executable and sync them to the cloud VM
        chmod +x scripts/script-build.sh
        rsync -e "ssh ${SSH_ARGS[*]}" -ra scripts "$SSH_HOST:$BUILD_DIR"
        rsync -e "ssh ${SSH_ARGS[*]}" -ra /var/workdir/source/ "$SSH_HOST:$BUILD_DIR/workspaces/source/"

        ssh "${SSH_ARGS[@]}" "$SSH_HOST" "$BUILD_DIR/scripts/script-build.sh"
        rsync -e "ssh ${SSH_ARGS[*]}" -ra "$SSH_HOST:$BUILD_DIR/tekton-results/" "/tekton/results/"

  volumes:
    - name: workdir
      emptyDir: {}
    - name: ssh
      secret:
        optional: false
        #secretName: multi-platform-ssh-$(context.taskRun.name)
        secretName: own-custom-vm
