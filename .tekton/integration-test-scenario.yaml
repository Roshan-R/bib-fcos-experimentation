# IntegrationTestScenario to run kola QEMU tests via Testing Farm
# after a successful disk-images-rawhide build.
#
# Apply with: kubectl apply -f .tekton/integration-test-scenario.yaml -n coreos-tenant
#
# Prerequisites:
#   - A Kubernetes secret "testing-farm-secret" with key "testing-farm-token"
#     must exist in the coreos-tenant namespace.
#     See: https://docs.testing-farm.io/Testing%20Farm/0.1/onboarding.html
#
# The Testing Farm pre-process task automatically extracts IMAGE_URL from the
# Konflux snapshot. Our tmt plan uses IMAGE_URL to pull the QEMU disk image
# via: oras pull --platform qemu/amd64 $IMAGE_URL
apiVersion: appstudio.redhat.com/v1beta2
kind: IntegrationTestScenario
metadata:
  name: disk-images-rawhide-kola-qemu
  namespace: coreos-tenant
  labels:
    # Mark as optional so a test failure does not block releases while
    # the test setup is being validated. Remove this label once stable.
    test.appstudio.openshift.io/optional: "true"
spec:
  application: fedora-coreos-rawhide
  contexts:
    - name: component_disk-images-rawhide
  resolverRef:
    resolver: git
    params:
      - name: url
        value: https://gitlab.com/testing-farm/integrations-konflux
      - name: revision
        value: v3.21
      - name: pathInRepo
        value: pipeline/tmt-via-testing-farm/tmt-via-testing-farm.yaml
  params:
    - name: COMPOSE
      value: Fedora-Rawhide
    - name: ARCH
      value: x86_64
    - name: IMAGE_TAG
      value: v3.21
    - name: TMT_PATH
      value: tmt
    - name: TMT_PLAN
      value: /plans/kola-qemu
    - name: TIMEOUT
      value: "240"
    - name: HARDWARE
      value: "memory=>= 8 GB;disk.size=>= 50 GB;virtualization.is-supported=true;cpu.processors=>= 4"
