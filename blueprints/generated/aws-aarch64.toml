name = "Fedora CoreOS"

[customizations]

[customizations.ignition]

[customizations.ignition.firstboot]
empty = true

[customizations.kernel]
append = "mitigations=auto,nosmt ignition.platform.id=aws console=ttyS0,115200n8"

[customizations.bootloader]

[customizations.bootloader.grub2]
terminal_input = ["serial_efi0"]
terminal_output = ["serial_efi0"]
serial = "serial --speed=115200 efi0"
