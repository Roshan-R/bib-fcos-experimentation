name = "Fedora CoreOS"

[customizations]

[customizations.ignition]

[customizations.ignition.firstboot]
empty = true

[customizations.kernel]
append = "mitigations=auto,nosmt $ignition_firstboot ignition.platform.id=applehv console=tty0 console=hvc0"

[customizations.bootloader]

[customizations.bootloader.grub2]
terminal_input = ["serial", "console"]
terminal_output = ["serial", "console"]
serial = "serial --speed=115200"
