# Platform: aws — aarch64
# Canonical source: https://github.com/coreos/fedora-coreos-config/blob/testing-devel/platforms.yaml
[customizations.kernel]
append = "ignition.platform.id=aws console=ttyS0,115200n8"

[customizations.bootloader.grub2]
terminal_input = ["serial_efi0"]
terminal_output = ["serial_efi0"]
serial = "serial --speed=115200 efi0"
